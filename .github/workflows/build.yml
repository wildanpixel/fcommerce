name: Build Desktop Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows:
    name: Windows Desktop
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build React and Electron code
        run: pnpm build

      - name: Package Windows
        run: pnpm --filter @marketplace-intelligence-os/desktop exec electron-builder --win --x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-intelligence-os-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          if-no-files-found: error

  macos:
    name: macOS Desktop
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build React and Electron code
        run: pnpm build

      - name: Package macOS
        run: pnpm --filter @marketplace-intelligence-os/desktop exec electron-builder --mac --x64 --arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-intelligence-os-macos
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/mac*/
          if-no-files-found: error
